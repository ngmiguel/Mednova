<div class="auth-page">
  <div class="auth-card">
    <h2>Connexion MedNova</h2>
    <p>Accédez à la plateforme de santé prédictive</p>

    @if (error()) {
      <div class="alert error">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      @if (!twoFactorStep()) {
        <label>
          Email
          <input type="email" formControlName="email" autocomplete="username" />
        </label>
        <label>
          Mot de passe
          <input type="password" formControlName="password" autocomplete="current-password" />
        </label>
      } @else {
        <label>
          Code 2FA (Google Authenticator)
          <input type="text" formControlName="code" maxlength="6" inputmode="numeric" />
        </label>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Connexion…' : twoFactorStep() ? 'Valider 2FA' : 'Se connecter' }}
      </button>
    </form>
  </div>
</div>
