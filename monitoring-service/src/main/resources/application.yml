server:
  port: 8085

spring:
  application:
    name: monitoring-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/monitoring_db
    username: ${POSTGRES_USER:mednova}
    password: ${POSTGRES_PASSWORD:mednova_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

mednova:
  monitoring:
    anomaly:
      heart-rate-min: 50
      heart-rate-max: 120
      systolic-bp-min: 90
      systolic-bp-max: 180
      diastolic-bp-min: 60
      diastolic-bp-max: 110
      temperature-min: 35.0
      temperature-max: 38.5
      oxygen-saturation-min: 92
